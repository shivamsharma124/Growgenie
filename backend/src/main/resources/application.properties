# ─── Server ───────────────────────────────────────────────────────────────────
server.port=8081

# ─── Database ─────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/growgenie_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=@Titano0
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ─── JWT ──────────────────────────────────────────────────────────────────────
jwt.secret=GrowGenieSecretKey2024SuperSecureHMACKey1234567890
jwt.expiration=86400000

# ─── OpenAI ───────────────────────────────────────────────────────────────────
# Groq API (OpenAI compatible)
openai.api.key=${GROQ_API_KEY}
openai.api.url=https://api.groq.com/openai/v1/chat/completions
openai.model=llama-3.3-70b-versatile

# Spring AI wali lines reh sakti hain ya hata de (conflict avoid karne ko)
# spring.ai.openai.api-key=...
# spring.ai.openai.base-url=...
# spring.ai.openai.chat.options.model=...

# ─── File Storage (PDF invoices) ──────────────────────────────────────────────
app.invoice.storage-path=invoices/

# ─── CORS ─────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ─── Swagger ──────────────────────────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/api-docs

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.growgenie=DEBUG
logging.level.org.springframework.security=INFO
